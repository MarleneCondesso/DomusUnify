          "200": {
            "description": "OK",

                "schema": {
                  "type": "array",

                  }
                }

                  "items": {

                  }

    "/api/v1/activity": {
      "get": {
        "tags": [
          "Activity"
        ],
        "summary": "Obtém entradas do feed de atividade (paginado).",
        "description": "Útil para \"View All Activity\".",
        "parameters": [
          {
            "name": "skip",
            "in": "query",
            "description": "Número de registos a saltar (por defeito 0).",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "take",
            "in": "query",
            "description": "Número de registos a devolver (por defeito 50).",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 50
            }
          },
          {
            "name": "type",
            "in": "query",
            "description": "Filtro opcional por tipo/área.\r\nValores suportados: `lists`, `budget`, `calendar`.",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "fromUtc",
            "in": "query",
            "description": "Filtro opcional por data/hora inicial (UTC).",
            "schema": {
              "type": "string",
              "format": "date-time"
            }
          },
          {
            "name": "toUtc",
            "in": "query",
            "description": "Filtro opcional por data/hora final (UTC, exclusivo).",
            "schema": {
              "type": "string",
              "format": "date-time"
            }
          },
          {
            "name": "dateUtc",
            "in": "query",
            "description": "Filtro opcional por dia inteiro (UTC). Não pode ser usado em conjunto com fromUtc/toUtc.",
            "schema": {
              "type": "string",
              "format": "date",
              "example": "2026-02-04"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "text/plain": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ActivityEntryResponse"
                  }
                }
              },
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ActivityEntryResponse"
                  }
                }
              },
              "text/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ActivityEntryResponse"
                  }
                }
              }
            }
          }
        }
      }

    "/api/v1/calendar/events": {
      "get": {
        "tags": [
          "Calendar"
        ],
        "summary": "Lista eventos do calendário visíveis para o utilizador autenticado.",
        "description": "Pode filtrar por:\r\n- dateUtc (dia inteiro, UTC)\r\n- intervalo (fromUtc/toUtc)\r\n- search (parte do título)\r\n- participantUserId (participante específico)\r\n- take (limitar o número de eventos devolvidos)\r\n            \r\nSe nenhum filtro for fornecido, devolve uma janela default (ex: últimos 7 dias + próximos 30).",
        "parameters": [
          {
            "name": "fromUtc",
            "in": "query",
            "description": "Data/hora inicial (UTC) para filtrar por intervalo, opcional.",
            "schema": {
              "type": "string",
              "format": "date-time"
            }
          },
          {
            "name": "toUtc",
            "in": "query",
